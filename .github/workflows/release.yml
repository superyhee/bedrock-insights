name: Release

# Publishes to PyPI when a version tag (e.g. v0.3.0) is pushed, or when a
# GitHub Release is published. Uses PyPI Trusted Publishing (OIDC) — no API
# tokens are stored as secrets. Configure the trusted publisher once at
# https://pypi.org/manage/project/bedrock-insights/settings/publishing/
# (workflow: release.yml, environment: pypi).

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Check metadata
        run: twine check dist/*
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG=$(python -c "import bedrock_insights; print(bedrock_insights.__version__)")
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$PKG tag=$TAG"
          test "$PKG" = "$TAG"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
