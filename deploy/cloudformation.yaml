AWSTemplateFormatVersion: "2010-09-09"
Description: >
  One-click deploy of the bedrock-insights web dashboard. The dashboard runs on
  an EC2 instance in a PUBLIC subnet, but its security group only admits traffic
  from the CloudFront managed prefix list, so the public internet cannot reach
  it directly — CloudFront is the single entry point. The template also enables
  Bedrock model invocation logging in this region and runs the token-protected
  dashboard as a systemd service under a read-only IAM role.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Access" }
        Parameters: [AccessToken, PriceClass]
      - Label: { default: "Instance" }
        Parameters: [InstanceType, Regions, LogRetentionDays, LatestAmiId]
      - Label: { default: "Network" }
        Parameters: [VpcCidr]

Parameters:
  AccessToken:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: >
      Token required to access the dashboard (passed as ?token= / cookie / Bearer).
      Generate one, e.g. `openssl rand -hex 16`.
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]
  Regions:
    Type: String
    Default: ""
    Description: >
      Comma-separated regions to monitor (e.g. us-east-1,us-west-2). Leave blank
      to use this stack's region. Logging is only enabled here — enable it in
      other regions separately to see their data.
  LogRetentionDays:
    Type: Number
    Default: 90
    AllowedValues:
      [
        1,
        3,
        5,
        7,
        14,
        30,
        60,
        90,
        120,
        150,
        180,
        365,
        400,
        545,
        731,
        1827,
        3653,
      ]
    Description: CloudWatch retention (days) for the Bedrock invocation log group.
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues: [PriceClass_100, PriceClass_200, PriceClass_All]
    Description: CloudFront price class (edge-location coverage).
  VpcCidr:
    Type: String
    Default: 10.20.0.0/16
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    Description: CIDR for the VPC created by this stack.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI (resolved automatically).

Resources:
  # ─────────────────────────────────────────────────────────────────────────
  # Networking: a single public subnet. The instance gets a public IP and
  # reaches the internet (PyPI / AWS APIs / SSM) directly via the IGW — no NAT.
  # ─────────────────────────────────────────────────────────────────────────
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: bedrock-insights }]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{ Key: Name, Value: bedrock-insights }]

  IgwAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 4, 8]]
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: bedrock-insights }]

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: bedrock-insights }]

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  # ── Resolve the CloudFront origin-facing managed prefix list ID ────────────
  # Its ID is region-specific and has no pseudo-parameter, so we look it up.
  PrefixListFnRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: describe-prefix-lists
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ec2:DescribeManagedPrefixLists
                Resource: "*"

  PrefixListFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt PrefixListFnRole.Arn
      Code:
        ZipFile: |
          import json
          import urllib.request

          import boto3

          NAME = "com.amazonaws.global.cloudfront.origin-facing"


          def _respond(event, context, status, data=None, reason=""):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See log stream: {context.log_stream_name}",
                  "PhysicalResourceId": event.get("PhysicalResourceId") or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data or {},
              }).encode("utf-8")
              req = urllib.request.Request(
                  event["ResponseURL"], data=body, method="PUT",
                  headers={"content-type": "", "content-length": str(len(body))},
              )
              urllib.request.urlopen(req)  # noqa: S310 (CFN-signed S3 URL)


          def handler(event, context):
              if event["RequestType"] == "Delete":
                  _respond(event, context, "SUCCESS")
                  return
              try:
                  ec2 = boto3.client("ec2")
                  resp = ec2.describe_managed_prefix_lists(
                      Filters=[{"Name": "prefix-list-name", "Values": [NAME]}]
                  )
                  pl_id = resp["PrefixLists"][0]["PrefixListId"]
                  _respond(event, context, "SUCCESS", {"PrefixListId": pl_id})
              except Exception as exc:
                  print(f"error: {exc}")
                  _respond(event, context, "FAILED", reason=str(exc))

  CloudFrontPrefixList:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt PrefixListFn.Arn

  # ── Security group: dashboard port reachable only from CloudFront ──────────
  DashboardSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: bedrock-insights dashboard (CloudFront prefix list only)
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8765
          ToPort: 8765
          SourcePrefixListId: !GetAtt CloudFrontPrefixList.PrefixListId
          Description: Dashboard HTTP from CloudFront edge locations only
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Outbound for pip install, AWS API calls, and SSM
      Tags: [{ Key: Name, Value: bedrock-insights }]

  # ─────────────────────────────────────────────────────────────────────────
  # CloudWatch log group Bedrock writes invocations to + the role it assumes.
  # ─────────────────────────────────────────────────────────────────────────
  BedrockLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: /aws/bedrock/model-invocations
      RetentionInDays: !Ref LogRetentionDays

  BedrockLoggingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: bedrock.amazonaws.com }
            Action: sts:AssumeRole
            Condition:
              StringEquals: { aws:SourceAccount: !Ref AWS::AccountId }
      Policies:
        - PolicyName: write-invocation-logs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  [
                    logs:CreateLogStream,
                    logs:PutLogEvents,
                    logs:DescribeLogStreams,
                  ]
                Resource: !Sub "${BedrockLogGroup.Arn}:*"

  # ── Read-only role the dashboard instance runs under ───────────────────────
  DashboardRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM Session Manager for shell access (no SSH ingress needed).
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore"
      Policies:
        - PolicyName: bedrock-insights-readonly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Read invocation logs (the dashboard's data source).
              - Effect: Allow
                Action: logs:FilterLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:*:${AWS::AccountId}:log-group:/aws/bedrock/model-invocations:*"
              # Resolve model + inference-profile names for display.
              - Effect: Allow
                Action:
                  - bedrock:ListFoundationModels
                  - bedrock:ListInferenceProfiles
                Resource: "*"
              # Point-in-time on-demand pricing lookups.
              - Effect: Allow
                Action:
                  - pricing:ListPriceLists
                  - pricing:GetPriceListFileUrl
                Resource: "*"

  DashboardInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref DashboardRole]

  # ── Lambda-backed custom resource: enable Bedrock invocation logging ───────
  # There is no native CloudFormation resource for
  # put-model-invocation-logging-configuration, so we drive the API ourselves.
  EnableLoggingFnRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: manage-bedrock-logging
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:PutModelInvocationLoggingConfiguration
                  - bedrock:GetModelInvocationLoggingConfiguration
                  - bedrock:DeleteModelInvocationLoggingConfiguration
                Resource: "*"
              # Bedrock must be allowed to receive the logging role on enable.
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt BedrockLoggingRole.Arn
                Condition:
                  StringEquals: { iam:PassedToService: bedrock.amazonaws.com }

  EnableLoggingFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      Role: !GetAtt EnableLoggingFnRole.Arn
      Code:
        ZipFile: |
          import json
          import time
          import urllib.request

          import boto3


          def _respond(event, context, status, reason=""):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See CloudWatch log stream: {context.log_stream_name}",
                  "PhysicalResourceId": event.get("PhysicalResourceId") or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": {},
              }).encode("utf-8")
              req = urllib.request.Request(
                  event["ResponseURL"], data=body, method="PUT",
                  headers={"content-type": "", "content-length": str(len(body))},
              )
              urllib.request.urlopen(req)  # noqa: S310 (CFN-signed S3 URL)


          def handler(event, context):
              status, reason = "SUCCESS", ""
              try:
                  bedrock = boto3.client("bedrock")
                  props = event.get("ResourceProperties", {})
                  if event["RequestType"] == "Delete":
                      try:
                          bedrock.delete_model_invocation_logging_configuration()
                      except Exception as exc:  # already gone / no perms — don't block teardown
                          print(f"delete ignored: {exc}")
                  else:
                      cfg = {
                          "cloudWatchConfig": {
                              "logGroupName": props["LogGroupName"],
                              "roleArn": props["RoleArn"],
                          },
                          "textDataDeliveryEnabled": True,
                          "imageDataDeliveryEnabled": False,
                          "embeddingDataDeliveryEnabled": False,
                      }
                      # Retry: the Bedrock logging role may still be propagating.
                      last = None
                      for _ in range(6):
                          try:
                              bedrock.put_model_invocation_logging_configuration(loggingConfig=cfg)
                              last = None
                              break
                          except Exception as exc:
                              last = exc
                              time.sleep(5)
                      if last is not None:
                          raise last
              except Exception as exc:
                  status, reason = "FAILED", str(exc)
                  print(f"error: {exc}")
              _respond(event, context, status, reason)

  EnableLogging:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt EnableLoggingFn.Arn
      LogGroupName: !Ref BedrockLogGroup
      RoleArn: !GetAtt BedrockLoggingRole.Arn

  # ── EC2 instance running the dashboard as a systemd service ────────────────
  DashboardInstance:
    Type: AWS::EC2::Instance
    DependsOn: PublicDefaultRoute
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref DashboardInstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds: [!Ref DashboardSecurityGroup]
      MetadataOptions:
        HttpTokens: required # enforce IMDSv2
      Tags:
        - { Key: Name, Value: bedrock-insights }
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          dnf install -y python3 python3-pip
          pip3 install --no-input bedrock-insights

          REGION_ARG="--region ${AWS::Region}"
          if [ -n "${Regions}" ]; then
            REGION_ARG="--region ${Regions}"
          fi

          cat >/etc/systemd/system/bedrock-insights.service <<EOF
          [Unit]
          Description=bedrock-insights dashboard
          After=network-online.target
          Wants=network-online.target

          [Service]
          Environment=BEDROCK_INSIGHTS_TOKEN=${AccessToken}
          Environment=AWS_DEFAULT_REGION=${AWS::Region}
          ExecStart=/usr/local/bin/bedrock-insights --host 0.0.0.0 --port 8765 $REGION_ARG
          Restart=always
          RestartSec=5
          User=root

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reload
          systemctl enable --now bedrock-insights.service

  # ── CloudFront in front of the instance's public endpoint ──────────────────
  DashboardDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: bedrock-insights dashboard
        PriceClass: !Ref PriceClass
        Origins:
          - Id: dashboard
            DomainName: !GetAtt DashboardInstance.PublicDnsName
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 8765
        DefaultCacheBehavior:
          TargetOriginId: dashboard
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          # CachingDisabled — the dashboard polls live data.
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          # AllViewerExceptHostHeader — forward token cookie / Authorization /
          # query string to the origin so auth works through CloudFront.
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  DashboardURL:
    Description: >
      Open this, then append ?token=YOUR_TOKEN the first time (the page stores
      it in a cookie and strips it from the URL afterwards).
    Value: !Sub "https://${DashboardDistribution.DomainName}"
  DistributionId:
    Value: !Ref DashboardDistribution
  InstanceId:
    Description: Connect for debugging via SSM Session Manager.
    Value: !Ref DashboardInstance
  Note:
    Description: Security notes.
    Value: >
      The security group admits only the CloudFront managed prefix list, so the
      public internet cannot reach the instance directly — but that prefix list
      is shared by all CloudFront distributions, so the dashboard token remains
      the user-facing gate. The access token is embedded in EC2 user data and is
      recoverable via ec2:DescribeInstanceAttribute by principals with that
      permission.
